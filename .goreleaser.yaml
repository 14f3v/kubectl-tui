# goreleaser configuration for kubetui.
# Build locally with: goreleaser build --snapshot --clean
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: kubetui
    main: ./cmd/kubetui
    binary: kubetui
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: kubetui
    formats: [tar.gz]
    name_template: "kubetui_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE*
      - docs/*

checksum:
  name_template: "checksums.txt"

# `goreleaser release` (run by .github/workflows/release.yml on a v* tag) creates a
# GitHub Release for the repo. Tags with a pre-release suffix (e.g. v1.0.0-rc1) are
# marked as prereleases automatically.
release:
  prerelease: auto

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

# Publish a Homebrew formula to the private tap on release. The tap push uses
# HOMEBREW_TAP_TOKEN (a PAT with write access to 14f3v/homebrew-tap), supplied by
# the release workflow — the default GITHUB_TOKEN can't push to another repo.
# Because kubectl-tui is private, installers need a GitHub token with repo access:
#   export HOMEBREW_GITHUB_API_TOKEN=<token>
#   brew install 14f3v/tap/kubetui
brews:
  - repository:
      owner: 14f3v
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/14f3v/kubectl-tui"
    description: "A terminal UI for managing and monitoring Kubernetes clusters"
    # license intentionally omitted for now (repo is private, undecided).
    install: |
      bin.install "kubetui"
    test: |
      system "#{bin}/kubetui", "--version"
