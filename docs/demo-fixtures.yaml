# docs/demo-fixtures.yaml — throwaway workloads for README screenshots.
#
# Spin up a local cluster, seed it, record, tear down:
#   brew install kind vhs
#   kind create cluster --name kubetui-demo
#   kubectl apply -f docs/demo-fixtures.yaml
#   kubectl -n demo rollout status deploy/web        # wait until pods are Running
#   vhs docs/demo.tape                               # uses your current kube-context (kind)
#   kind delete cluster --name kubetui-demo
#
# Generic names (web / api / worker / cache) so nothing real leaks into the images,
# and a "web" deployment so the tape's "/web" filter shot has a match.
apiVersion: v1
kind: Namespace
metadata:
  name: demo
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: web, namespace: demo }
spec:
  replicas: 3
  selector: { matchLabels: { app: web } }
  template:
    metadata: { labels: { app: web, tier: frontend } }
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports: [{ containerPort: 80 }]
          resources: { requests: { cpu: 10m, memory: 16Mi } }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: api, namespace: demo }
spec:
  replicas: 2
  selector: { matchLabels: { app: api } }
  template:
    metadata: { labels: { app: api, tier: backend } }
    spec:
      containers:
        - name: api
          image: nginx:alpine
          ports: [{ containerPort: 80 }]
          resources: { requests: { cpu: 10m, memory: 16Mi } }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: worker, namespace: demo }
spec:
  replicas: 2
  selector: { matchLabels: { app: worker } }
  template:
    metadata: { labels: { app: worker, tier: backend } }
    spec:
      containers:
        - name: worker
          image: busybox:1.36
          command: ["sh", "-c", "while true; do echo working; sleep 30; done"]
          resources: { requests: { cpu: 10m, memory: 8Mi } }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: cache, namespace: demo }
spec:
  replicas: 1
  selector: { matchLabels: { app: cache } }
  template:
    metadata: { labels: { app: cache, tier: data } }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports: [{ containerPort: 6379 }]
          resources: { requests: { cpu: 10m, memory: 16Mi } }
---
apiVersion: v1
kind: Service
metadata: { name: web, namespace: demo }
spec:
  selector: { app: web }
  ports: [{ port: 80, targetPort: 80 }]
