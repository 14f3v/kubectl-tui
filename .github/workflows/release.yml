name: release

# Publishes binaries when a version tag is pushed, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
# goreleaser builds every target in .goreleaser.yaml, packages archives +
# checksums, and creates a GitHub Release with those assets and a changelog.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release and upload the built assets

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # goreleaser needs the full history and all tags
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - name: Release
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
